<!--
	Yuumi Pretty Shell
	-------------------------------
	A blank canvas with the shared Yuumi visual language baked in. The body is intentionally empty —
	you, the agent, design the page structure based on the artifact you are making.

	HOW TO USE:
	1. Copy this file to the requested artifact path, usually <slug>.html in the current working directory.
	2. Set <html lang="..."> and <title> based on the target.
	3. Write your content inside <div class="container">. There is no prescribed order
	   of sections — design what serves the reader.
	4. Use components from ../references/components.md as a catalog (not a checklist).
	5. The animation script at the bottom is opt-in: it only activates if you add an
	   SVG figure with id="parallelFig" and paths with class="parallel-line".

	Typography model:
	- Body text (Korean and English alike): Hahmlet — a serif optimized for CJK + Latin.
	- Code, pre, kbd, samp: JetBrains Mono.
	- Visual hierarchy comes from size and weight within a single family,
	  not from a serif/sans contrast.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Explainer</title>
<script>document.documentElement.classList.add('js');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
	:root {
		/* Yuumi reference swatches: warm paper, near-black ink, restrained clay accent. */
		--bg: #F5F4ED;
		--bg-deep: #EFEDE4;
		--surface: #FAF9F5;
		--surface-warm: #E8E6DC;
		--text: #141413;
		--text-dim: #5E5D59;
		--text-faint: #87867F;
		--text-warm: #4D4C48;
		--rule: #E8E6DC;
		--rule-soft: #F0EEE6;
		--rule-strong: #D1CFC5;
		--accent: #C96442;
		--accent-clay: #D97757;
		--accent-deep: #A75A40;
		--accent-hero: #C46849;
		--accent-soft: #EBC9B7;
		--accent-pale: #F0D5C7;
		--dark: #1F1E1D;
		--dark-2: #30302E;
		--silver: #B0AEA5;
		--code-bg: #1F1E1D;
		--code-fg: #FAF9F5;
		--code-dim: #B0AEA5;
	}

	* { box-sizing: border-box; }
	html { background: var(--bg); }

	body {
		margin: 0;
		padding: 0;
		background: var(--bg);
		color: var(--text);
		font-family: 'Hahmlet', Georgia, serif;
		font-size: 19px;
		line-height: 1.75;
		font-weight: 400;
		letter-spacing: -0.003em;
		word-break: keep-all;
		overflow-wrap: anywhere;
		-webkit-font-smoothing: antialiased;
		-moz-osx-font-smoothing: grayscale;
	}

	/* Code, preformatted text, keyboard input, sample output — all monospace */
	code, pre, kbd, samp {
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
	}

	::selection { background: var(--accent-soft); color: var(--text); }

	.container {
		max-width: 1140px;
		margin: 0 auto;
		padding: 88px 28px 140px;
	}
	/* The TOC (if present) is position:fixed and therefore OUT of normal flow, so
	   the container needs no special layout — content always renders full width.
	   See the .toc rules below. */

	/* ── Typographic primitives ── */

	.eyebrow {
		font-size: 12px;
		font-weight: 500;
		letter-spacing: 0.16em;
		text-transform: uppercase;
		color: var(--accent-deep);
		margin: 0 0 28px;
	}

	h1 {
		font-weight: 500;
		font-size: 60px;
		line-height: 1.05;
		letter-spacing: -0.022em;
		margin: 0 0 28px;
		color: var(--text);
	}

	.lede {
		font-size: 24px;
		line-height: 1.45;
		color: var(--text-dim);
		font-weight: 400;
		font-style: italic;
		margin: 0 0 12px;
	}

	.byline {
		font-size: 13px;
		color: var(--text-faint);
		letter-spacing: 0.04em;
		margin-bottom: 64px;
	}
	.byline strong { color: var(--text-dim); font-weight: 500; }

	h2 {
		font-weight: 500;
		font-size: 30px;
		line-height: 1.2;
		letter-spacing: -0.012em;
		margin: 80px 0 24px;
		color: var(--text);
	}
	h2 .num {
		font-style: italic;
		font-weight: 400;
		color: var(--accent-deep);
		font-size: 0.6em;
		margin-right: 22px;
		vertical-align: 0.35em;
		letter-spacing: 0.02em;
	}

	h3 {
		font-weight: 500;
		font-size: 22px;
		line-height: 1.3;
		margin: 44px 0 20px;
		color: var(--text);
	}

	p { margin: 0 0 22px; }
	p + p { margin-top: -2px; }

	.body-start::first-letter {
		font-weight: 500;
		float: left;
		font-size: 62px;
		line-height: 0.92;
		padding: 6px 10px 0 0;
		color: var(--accent-deep);
	}

	a {
		color: var(--accent-deep);
		text-decoration: underline;
		text-underline-offset: 3px;
		text-decoration-thickness: 1px;
		text-decoration-color: var(--accent-soft);
		transition: text-decoration-color 120ms ease;
	}
	a:hover { text-decoration-color: var(--accent-deep); }

	strong { font-weight: 600; color: var(--text); }
	em { font-style: italic; }

	code {
		font-size: 0.95em;
		color: var(--accent-deep);
		background: transparent;
		padding: 0;
		font-weight: 500;
		vertical-align: -0.02em;
	}

	pre {
		background: var(--code-bg);
		color: var(--code-fg);
		padding: 34px 28px 24px;
		border-radius: 4px;
		overflow-x: auto;
		font-size: 13.5px;
		line-height: 1.65;
		margin: 32px -8px;
		position: relative;
	}

	pre[data-lang]::before {
		content: attr(data-lang);
		position: absolute;
		top: 10px;
		right: 16px;
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
		font-size: 10px;
		line-height: 1;
		letter-spacing: 0.08em;
		text-transform: uppercase;
		color: var(--code-dim);
		opacity: 0.72;
	}

	pre code {
		background: transparent;
		color: var(--code-fg);
		padding: 0;
		border-radius: 0;
		font-weight: 400;
		display: block;
		min-width: max-content;
	}

	/* PrismJS token theme tuned to warm dark code blocks. */
	.token.comment,
	.token.prolog,
	.token.doctype,
	.token.cdata {
		color: var(--code-dim);
		font-style: italic;
	}
	.token.punctuation { color: #D1CFC5; }
	.token.namespace { opacity: 0.72; }
	.token.property,
	.token.tag,
	.token.constant,
	.token.symbol,
	.token.deleted { color: #EBC9B7; }
	.token.boolean,
	.token.number { color: #F0D5C7; }
	.token.selector,
	.token.attr-name,
	.token.string,
	.token.char,
	.token.builtin,
	.token.inserted { color: #E8B888; }
	.token.operator,
	.token.entity,
	.token.url,
	.language-css .token.string,
	.style .token.string { color: #D1CFC5; }
	.token.atrule,
	.token.attr-value,
	.token.keyword { color: #D88A66; }
	.token.function,
	.token.class-name { color: #E8B888; }
	.token.regex,
	.token.important,
	.token.variable { color: #F0D5C7; }
	.token.important,
	.token.bold { font-weight: 600; }
	.token.italic { font-style: italic; }

	.hr-soft { border: none; border-top: 1px solid var(--rule); margin: 56px 0; }

	.ornament {
		text-align: center;
		color: var(--accent-deep);
		font-style: italic;
		font-size: 16px;
		letter-spacing: 0.5em;
		margin: 72px 0;
		opacity: 0.7;
	}

	/* ── Optional components — use when the meaning calls for it ── */

	/* Metadata block — borderless dl */
	.meta {
		border-top: 1px solid var(--rule-strong);
		border-bottom: 1px solid var(--rule-strong);
		padding: 22px 0;
		margin: 36px 0;
		display: grid;
		grid-template-columns: 110px 1fr;
		row-gap: 14px;
		column-gap: 28px;
		font-size: 15px;
	}
	.meta dt {
		text-transform: uppercase;
		letter-spacing: 0.1em;
		font-size: 11px;
		font-weight: 600;
		color: var(--text-faint);
		padding-top: 4px;
	}
	.meta dd { margin: 0; font-size: 15px; color: var(--text); line-height: 1.5; }
	.meta dd code { font-size: 13.5px; }
	/* Wrapper tolerance: the grid lays out DIRECT children only, so a nested
	   <dl> (the easy markup guess: <div class="meta"><dl>…) would otherwise
	   collapse whole into the 110px label column. display:contents promotes
	   its dt/dd back to grid items. The contract is still <dl class="meta">. */
	.meta > dl { display: contents; }

	.method-tag {
		display: inline-block;
		background: var(--text);
		color: var(--bg);
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
		font-size: 11px;
		font-weight: 600;
		padding: 3px 8px;
		border-radius: 3px;
		letter-spacing: 0.06em;
		margin-right: 10px;
		vertical-align: 1px;
	}

	/* Figures (used for SVG diagrams or images) */
	figure { margin: 44px -8px; padding: 0; }
	figure svg { display: block; width: 100%; height: auto; max-width: 100%; }
	figcaption {
		font-style: italic;
		font-size: 14.5px;
		line-height: 1.5;
		color: var(--text-dim);
		margin-top: 16px;
		padding: 0 24px;
		text-align: center;
	}
	figcaption .fig-num {
		font-weight: 500;
		color: var(--accent-deep);
		font-style: normal;
		font-size: 11px;
		text-transform: uppercase;
		letter-spacing: 0.1em;
		margin-right: 8px;
	}

	/*
	 * SVG text classes: SVG doesn't inherit body's font, so we must declare here.
	 * Use Hahmlet for prose-like labels, JetBrains Mono for code-like identifiers.
	 */
	.svg-text { font-family: 'Hahmlet', Georgia, serif; fill: var(--text); font-size: 13px; }
	.svg-text-italic { font-family: 'Hahmlet', Georgia, serif; font-style: italic; fill: var(--accent-deep); font-size: 12px; }
	.svg-text-mono { font-family: 'JetBrains Mono', monospace; fill: var(--text); font-size: 11.5px; }
	.svg-text-dim { font-family: 'Hahmlet', Georgia, serif; fill: var(--text-faint); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; }

	/* Step list with hanging italic numerals */
	.steps { margin: 40px 0; padding: 0; list-style: none; counter-reset: step; }
	.steps > li {
		counter-increment: step;
		position: relative;
		padding: 10px 0 10px 60px;
		min-height: 30px;
	}
	.steps > li::before {
		content: counter(step, decimal-leading-zero);
		position: absolute;
		left: 0;
		top: 12px;
		font-style: italic;
		font-size: 15px;
		color: var(--accent-deep);
	}
	.steps > li::after {
		content: "";
		position: absolute;
		left: 32px;
		top: 36px;
		bottom: -4px;
		width: 1px;
		background: var(--rule);
	}
	.steps > li:last-child::after { display: none; }
	.steps .step-title { font-size: 16px; color: var(--text); font-weight: 500; line-height: 1.45; }
	.steps .step-desc { font-size: 15px; color: var(--text-dim); margin-top: 4px; line-height: 1.6; }
	.steps .step-desc code { font-size: 13.5px; }

	/* Nested sub-group with accent left rail */
	.nest {
		margin: 14px 0 14px 60px;
		padding: 8px 0 8px 22px;
		border-left: 2px solid var(--accent);
		position: relative;
	}
	.nest[data-label]::before {
		content: attr(data-label);
		position: absolute;
		top: -8px;
		left: 18px;
		background: var(--bg);
		padding: 0 8px;
		font-size: 10px;
		font-weight: 600;
		letter-spacing: 0.16em;
		color: var(--accent-deep);
	}
	.nest ol { list-style: none; padding: 8px 0 4px; margin: 0; counter-reset: substep; }
	.nest ol li {
		counter-increment: substep;
		padding: 8px 0 8px 40px;
		position: relative;
		font-size: 16px;
		line-height: 1.55;
	}
	.nest ol li::before {
		content: counter(substep, upper-alpha);
		position: absolute;
		left: 0;
		top: 9px;
		font-style: italic;
		color: var(--accent-deep);
		font-size: 14px;
	}
	.nest ol li strong { font-weight: 600; }
	.nest ol li .desc { display: block; color: var(--text-dim); font-size: 14.5px; margin-top: 2px; line-height: 1.6; }
	.nest ol li .desc code { font-size: 13px; }

	/* Callout — minimal left-accent */
	.callout {
		margin: 36px 0;
		padding: 4px 0 4px 22px;
		border-left: 2px solid var(--accent);
	}
	.callout-label {
		font-style: italic;
		font-size: 14px;
		color: var(--accent-deep);
		font-weight: 500;
		margin-bottom: 6px;
	}
	.callout ul { margin: 0; padding: 0; list-style: none; }
	.callout li {
		font-size: 16.5px;
		line-height: 1.65;
		color: var(--text);
		padding: 4px 0 4px 16px;
		position: relative;
	}
	.callout li::before {
		content: "•";
		position: absolute;
		left: 0;
		top: 0.55em;
		color: var(--accent);
		font-size: 0.72em;
		line-height: 1;
	}

	/* Aside — softer, for cautions or side notes */
	.aside {
		margin: 36px 0;
		padding: 4px 0 4px 22px;
		border-left: 2px solid var(--rule-strong);
		font-size: 16.5px;
		color: var(--text-dim);
		line-height: 1.65;
	}
	.aside-label {
		font-style: italic;
		font-size: 14px;
		color: var(--text);
		font-weight: 500;
		margin-bottom: 6px;
	}

	/* Pull quote */
	blockquote {
		margin: 44px -10px;
		padding: 6px 0 6px 32px;
		font-size: 24px;
		line-height: 1.4;
		color: var(--text);
		font-style: italic;
		font-weight: 400;
		position: relative;
	}
	blockquote::before {
		content: "\201C";
		position: absolute;
		left: -6px;
		top: 8px;
		font-size: 56px;
		color: var(--accent);
		line-height: 0.5;
		font-style: normal;
	}

	/* Hairline table */
	.t-wrap { overflow-x: auto; margin: 32px 0; }
	table { width: 100%; border-collapse: collapse; font-size: 15.5px; background: transparent; }
	/* Keep row-label columns scannable. Auto table layout otherwise collapses the
	   first column in fact tables; 15em is ~1.5x the natural width observed in
	   mixed Korean/English labels, while .t-wrap still allows horizontal scroll. */
	th:first-child,
	td:first-child { min-width: 15em; }
	th, td {
		text-align: left;
		padding: 18px 16px 18px 0;
		border-bottom: 1px solid var(--rule);
		vertical-align: top;
		line-height: 1.65;
	}
	thead th {
		border-top: 1px solid var(--rule-strong);
		border-bottom: 1px solid var(--rule-strong);
		font-weight: 600;
		font-size: 11px;
		text-transform: uppercase;
		letter-spacing: 0.08em;
		color: var(--text-faint);
		padding-top: 10px;
		padding-bottom: 10px;
	}
	td:last-child, th:last-child { padding-right: 0; }
	td code { font-size: 13.5px; }
	/* Cells should not break on every character — the global overflow-wrap:anywhere
	   (set on body for long URLs/code) otherwise collapses short cells to 2-3 lines. */
	th, td { overflow-wrap: normal; word-break: normal; }
	.col-tight { white-space: nowrap; }

	/* Collapsible section — progressive disclosure. Native <details> works without JS;
	   never put the page's headline insight inside a fold. */
	.fold { border-top: 1px solid var(--rule); margin: 8px 0; }
	.fold > summary {
		list-style: none; cursor: pointer; padding: 16px 0;
		font-family: 'Hahmlet', Georgia, serif; font-size: 19px; color: var(--text);
		display: flex; align-items: baseline; gap: 12px;
	}
	.fold > summary::-webkit-details-marker { display: none; }
	.fold > summary::before {
		content: "›"; color: var(--accent); font-size: 18px;
		transition: transform 0.18s ease; transform: translateY(-1px);
	}
	.fold[open] > summary::before { transform: rotate(90deg) translateX(-1px); }
	.fold > summary:hover { color: var(--accent-deep); }
	.fold > *:not(summary) { margin-left: 24px; }
	@media (prefers-reduced-motion: reduce) {
		.fold > summary::before { transition: none; }
	}

	/* Lessons / takeaway block — inline tagged title + dim body */
	.lesson { margin: 30px 0; padding: 0; }
	.lesson-tag {
		display: inline-block;
		font-style: italic;
		font-size: 13px;
		color: var(--accent-deep);
		margin-right: 8px;
	}
	.lesson-title {
		display: inline;
		font-weight: 500;
		font-size: 19px;
		color: var(--text);
	}
	.lesson-body {
		font-size: 17px;
		color: var(--text-dim);
		line-height: 1.7;
		margin-top: 8px;
	}

	/* Footnotes block */
	.footnotes {
		margin-top: 96px;
		padding-top: 32px;
		border-top: 1px solid var(--rule-strong);
		font-size: 14px;
		color: var(--text-dim);
		line-height: 1.65;
	}
	.footnotes ol { padding-left: 22px; margin: 0; }
	.footnotes li { margin-bottom: 10px; padding-left: 6px; }
	.footnotes code { font-size: 12.5px; color: var(--text-dim); }
	sup a {
		text-decoration: none;
		color: var(--accent-deep);
		font-size: 0.75em;
		font-weight: 500;
		padding: 0 1px;
	}

	/* Footnote hover/focus popover — preview without losing reading place. */
	.fnref { position: relative; }
	.fnref > a { text-decoration: none; color: var(--accent); }
	.fnref > a[data-note]:hover::after,
	.fnref > a[data-note]:focus::after {
		content: attr(data-note);
		position: absolute; left: 0; top: 1.6em; z-index: 5;
		width: max-content; max-width: 280px;
		background: var(--surface); color: var(--text-dim);
		border: 1px solid var(--rule-strong); border-radius: 3px;
		padding: 10px 12px; font-size: 13.5px; line-height: 1.6;
		box-shadow: 0 4px 14px rgba(20,20,19,0.08);
	}

	/*
	 * Path tree — two-column grid (handles CJK alignment robustly).
	 * .path uses monospace despite not being a <code> element, because the ASCII
	 * tree connectors (└── ├──) need fixed-width to align.
	 */
	.tree {
		background: var(--surface);
		border: 1px solid var(--rule);
		border-radius: 4px;
		padding: 22px 28px;
		margin: 32px 0;
		display: grid;
		grid-template-columns: max-content 1fr;
		column-gap: 32px;
		row-gap: 4px;
		overflow-x: auto;
	}
	.tree .path {
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
		font-size: 13px;
		line-height: 1.85;
		color: var(--text);
		white-space: pre;
	}
	.tree .path .dir { color: var(--accent-deep); font-weight: 500; }
	.tree .path .var { color: var(--accent-deep); font-style: italic; }
	.tree .path .branch { color: var(--text-faint); }
	.tree .note {
		font-style: italic;
		font-size: 13.5px;
		color: var(--text-faint);
		align-self: center;
		white-space: nowrap;
	}
	.tree .note:not(:empty)::before {
		content: "— ";
		color: var(--rule-strong);
		font-style: normal;
		margin-right: 2px;
	}

	/* Replay button for animations */
	.replay {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		background: transparent;
		border: 1px solid var(--rule-strong);
		color: var(--text-dim);
		padding: 6px 14px;
		font-size: 12px;
		letter-spacing: 0.04em;
		border-radius: 999px;
		cursor: pointer;
		margin-top: 12px;
		transition: all 150ms ease;
	}
	.replay:hover { border-color: var(--accent); color: var(--accent-deep); }
	.replay svg { width: 12px; height: 12px; }

	/* SVG animation primitives (JS at bottom controls dasharray).
	   Default = meaningful final still frame. JS hides only until it primes the paths. */
	.parallel-line { opacity: 1; }
	html.motion-ready #parallelFig .parallel-line:not(.ready) { opacity: 0; }
	html.parallel-error #parallelFig .parallel-line {
		opacity: 1 !important;
		stroke-dashoffset: 0 !important;
		transition: none !important;
	}
	#parallelFig #awaitNode { stroke: var(--accent); stroke-dasharray: 0; }
	#parallelFig #commitArrow,
	#parallelFig #commitLabel { opacity: 1; }
	html.motion-ready #parallelFig #awaitNode:not(.ready-final) { stroke: var(--rule-strong); stroke-dasharray: 3 3; }
	html.motion-ready #parallelFig #commitArrow:not(.ready-final),
	html.motion-ready #parallelFig #commitLabel:not(.ready-final) { opacity: 0; }

	@keyframes pulseDot {
		0%, 100% { opacity: 0.3; r: 3; }
		50%      { opacity: 1; r: 4.5; }
	}

			});
		}
		window.replayParallel = reducedMotion ? setFinalState : animate;
		bindReplay();
		if (reducedMotion) { setFinalState(); return; }
		if ('IntersectionObserver' in window) {
			const observer = new IntersectionObserver(function (entries) { entries.forEach(function (entry) { if (entry.isIntersecting) { animate(); observer.unobserve(entry.target); } }); }, { threshold: 0.35 });
			observer.observe(fig);
		} else {
			setFinalState();
		}
	} catch (error) {
		document.documentElement.classList.add('parallel-error');
		document.documentElement.dataset.prettyParallelError = error && error.message ? error.message : 'parallel animation failed';
	}
})();
</script>

<script>
/* Auto TOC — if a long page forgot the rail, build one from real h2 sections.
   Manual .toc always wins; short pages stay quiet. */
(function () {
	var container = document.querySelector('.container');
	if (!container || container.querySelector('.toc')) return;
	var headings = Array.prototype.slice.call(container.querySelectorAll('h2')).filter(function (h) {
		return h.textContent && h.textContent.trim();
	});
	if (headings.length < 4) return;

	var usedIds = {};
	Array.prototype.slice.call(document.querySelectorAll('[id]')).forEach(function (el) {
		if (el.id) usedIds[el.id] = true;
	});
	function labelFor(heading) {
		var clone = heading.cloneNode(true);
		Array.prototype.slice.call(clone.querySelectorAll('.num')).forEach(function (n) { n.remove(); });
		return clone.textContent.trim().replace(/\s+/g, ' ');
	}
	function slugFor(text, index) {
		var base = text.toLowerCase().replace(/[^a-z0-9가-힣]+/g, '-').replace(/^-+|-+$/g, '') || ('section-' + (index + 1));
		var id = base;
		var n = 2;
		while (usedIds[id]) { id = base + '-' + n; n += 1; }
		usedIds[id] = true;
		return id;
	}

	var nav = document.createElement('nav');
	nav.className = 'toc';
	nav.setAttribute('aria-label', 'Table of contents');
	headings.forEach(function (heading, index) {
		var label = labelFor(heading) || ('Section ' + (index + 1));
		if (!heading.id) heading.id = slugFor(label, index);
		var a = document.createElement('a');
		a.href = '#' + heading.id;
		a.textContent = label;
		nav.appendChild(a);
	});
	container.insertBefore(nav, container.firstElementChild);
	document.documentElement.dataset.prettyTocAuto = String(headings.length);
})();
</script>

<script>
/* TOC scrollspy — highlights the section currently in view. No-op if no .toc. */
(function () {
	var toc = document.querySelector('.toc');
	if (!toc || !('IntersectionObserver' in window)) return;
	var links = Array.prototype.slice.call(toc.querySelectorAll('a[href^="#"]'));
	var byId = {};
	links.forEach(function (a) { byId[a.getAttribute('href').slice(1)] = a; });
	var targets = links
		.map(function (a) { return document.getElementById(a.getAttribute('href').slice(1)); })
		.filter(Boolean);
	if (!targets.length) return;
	var obs = new IntersectionObserver(function (entries) {
		entries.forEach(function (en) {
			if (!en.isIntersecting) return;
			links.forEach(function (l) { l.classList.remove('active'); });
			var a = byId[en.target.id];
			if (a) a.classList.add('active');
		});
	}, { rootMargin: '0px 0px -70% 0px', threshold: 0 });
	targets.forEach(function (t) { obs.observe(t); });
})();
</script>

<script>
/* [data-tabs] — accessible progressive enhancement. Without JS all panels stay visible. */
(function () {
	var groupIndex = 0;
	document.querySelectorAll('[data-tabs]').forEach(function (group) {
		var tabs = Array.prototype.slice.call(group.querySelectorAll('.tab'));
		var panels = Array.prototype.slice.call(group.querySelectorAll('.tab-panel'));
		if (!tabs.length || !panels.length) return;
		group.classList.add('tabs-on');
		var bar = group.querySelector('.tab-bar');
		if (bar) bar.setAttribute('role', 'tablist');
		groupIndex += 1;

		function ensureId(el, fallback) {
			if (!el.id) el.id = fallback;
			return el.id;
		}

		tabs.forEach(function (t, index) {
			var targetId = t.getAttribute('data-tab');
			var panel = targetId ? document.getElementById(targetId) : panels[index];
			if (!panel) return;
			ensureId(panel, 'pretty-tab-panel-' + groupIndex + '-' + index);
			if (!targetId) { targetId = panel.id; t.setAttribute('data-tab', targetId); }
			var tabId = ensureId(t, 'pretty-tab-' + groupIndex + '-' + index);
			t.setAttribute('role', 'tab');
			t.setAttribute('aria-controls', targetId);
			panel.setAttribute('role', 'tabpanel');
			panel.setAttribute('aria-labelledby', tabId);
			panel.setAttribute('tabindex', '0');
		});

		function select(id, shouldFocus) {
			tabs.forEach(function (t) {
				var selected = t.getAttribute('data-tab') === id;
				t.setAttribute('aria-selected', String(selected));
				t.setAttribute('tabindex', selected ? '0' : '-1');
				if (selected && shouldFocus) t.focus();
			});
			panels.forEach(function (p) { p.hidden = (p.id !== id); });
		}

		function selectedIndex() {
			return Math.max(0, tabs.findIndex(function (t) { return t.getAttribute('aria-selected') === 'true'; }));
		}

		tabs.forEach(function (t) {
			t.addEventListener('click', function () { select(t.getAttribute('data-tab'), false); });
			t.addEventListener('keydown', function (event) {
				var i = selectedIndex();
				if (event.key === 'ArrowRight') i = (i + 1) % tabs.length;
				else if (event.key === 'ArrowLeft') i = (i - 1 + tabs.length) % tabs.length;
				else if (event.key === 'Home') i = 0;
				else if (event.key === 'End') i = tabs.length - 1;
				else return;
				event.preventDefault();
				select(tabs[i].getAttribute('data-tab'), true);
			});
		});
		select(tabs[0].getAttribute('data-tab'), false);
	});
})();
</script>

<script>
/* Before/after — progressive enhancement. */
(function () {
	document.querySelectorAll('[data-before-after]').forEach(function (el) {
		var range = el.querySelector('input[type="range"]');
		var stage = el.querySelector('.ba-stage');
		if (!range || !stage) return;
		el.classList.add('ba-on');
		function apply() { stage.style.setProperty('--split', range.value + '%'); }
		range.addEventListener('input', apply);
		apply();
	});
})();
</script>

<script>
/* Stepper — progressive enhancement. */
(function () {
	document.querySelectorAll('[data-stepper]').forEach(function (el) {
		var steps = Array.prototype.slice.call(el.querySelectorAll('.stepper-step'));
		var prev = el.querySelector('.stepper-prev');
		var next = el.querySelector('.stepper-next');
		var count = el.querySelector('.stepper-count');
		if (steps.length < 2 || !prev || !next) return;
		el.classList.add('stepper-on');
		var i = 0;
		function render() {
			steps.forEach(function (s, n) { s.classList.toggle('current', n === i); });
			if (count) count.textContent = (i + 1) + ' / ' + steps.length;
			prev.disabled = (i === 0);
			next.disabled = (i === steps.length - 1);
		}
		prev.addEventListener('click', function () { if (i > 0) { i--; render(); } });
		next.addEventListener('click', function () { if (i < steps.length - 1) { i++; render(); } });
		render();
	});
})();
</script>

<script>
/* Filterable table — progressive enhancement. */
(function () {
	document.querySelectorAll('[data-filter-table]').forEach(function (wrap) {
		var input = wrap.querySelector('.table-filter');
		var rows = Array.prototype.slice.call(wrap.querySelectorAll('tbody tr'));
		if (!input || !rows.length) return;
		wrap.classList.add('filter-on');
		input.addEventListener('input', function () {
			var q = input.value.trim().toLowerCase();
			rows.forEach(function (r) {
				r.hidden = q !== '' && r.textContent.toLowerCase().indexOf(q) === -1;
			});
		});
	});
})();
</script>

<script>
/* Heavy-library lazy loader — only fetches Chart.js / Mermaid when the page
   actually uses them. Pinned CDN; online viewing is assumed. */
(function () {
	var PINS = {
		chart: 'https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js',
		mermaid: 'https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js'
	};
	function token(name, fallback) {
		var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
		return v || fallback;
	}
	function inject(src, onload) {
		var s = document.createElement('script');
		s.src = src; s.async = true; s.crossOrigin = 'anonymous';
		s.onload = onload;
		s.onerror = function () { document.documentElement.dataset.prettyLibError = src; };
		document.head.appendChild(s);
	}
	if (document.querySelector('[data-chart]')) {
		inject(PINS.chart, function () {
			if (!window.Chart) return;
			Chart.defaults.color = token('--text-dim', '#5e5d59');
			Chart.defaults.borderColor = token('--rule', '#e8e6dc');
			Chart.defaults.font.family = "'JetBrains Mono', ui-monospace, monospace";
			var accent = token('--accent', '#c96442');
			document.querySelectorAll('[data-chart]').forEach(function (el) {
				try {
					var cfg = JSON.parse(el.getAttribute('data-chart'));
					((cfg.data && cfg.data.datasets) || []).forEach(function (ds) {
						if (ds.backgroundColor === undefined) ds.backgroundColor = accent;
						if (ds.borderColor === undefined) ds.borderColor = accent;
					});
					new Chart(el, cfg);
				} catch (e) { document.documentElement.dataset.prettyChartError = e.message; }
			});
		});
	}
	if (document.querySelector('.mermaid')) {
		inject(PINS.mermaid, function () {
			if (!window.mermaid) return;
			try {
				mermaid.initialize({
					startOnLoad: false, theme: 'base',
					themeVariables: {
						primaryColor: token('--surface', '#faf9f5'),
						primaryTextColor: token('--text', '#141413'),
						primaryBorderColor: token('--rule-strong', '#d1cfc5'),
						lineColor: token('--text-dim', '#5e5d59'),
						fontFamily: "'JetBrains Mono', ui-monospace, monospace"
					}
				});
				mermaid.run();
			} catch (e) { document.documentElement.dataset.prettyMermaidError = e.message; }
		});
	}
})();
</script>
