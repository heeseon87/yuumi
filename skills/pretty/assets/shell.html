<!--
	Anthropic-style Pretty Shell
	-------------------------------
	A blank canvas with the shared Claude Kit visual language baked in. The body is intentionally empty —
	you, the agent, design the page structure based on the artifact you are making.

	HOW TO USE:
	1. Copy this file to the requested artifact path, usually <slug>.html in the current working directory.
	2. Set <html lang="..."> and <title> based on the target.
	3. Write your content inside <div class="container">. There is no prescribed order
	   of sections — design what serves the reader.
	4. Use components from ../references/components.md as a catalog (not a checklist).
	5. The animation script at the bottom is opt-in: it only activates if you add an
	   SVG figure with id="parallelFig" and paths with class="parallel-line".

	Typography model:
	- Body text (Korean and English alike): Hahmlet — a serif optimized for CJK + Latin.
	- Code, pre, kbd, samp: JetBrains Mono.
	- Visual hierarchy comes from size and weight within a single family,
	  not from a serif/sans contrast.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Explainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
	:root {
		/* Anthropic reference swatches observed from anthropic.com / claude.com pages. */
		--bg: #F5F4ED;
		--bg-deep: #EFEDE4;
		--surface: #FAF9F5;
		--surface-warm: #E8E6DC;
		--text: #141413;
		--text-dim: #5E5D59;
		--text-faint: #87867F;
		--text-warm: #4D4C48;
		--rule: #E8E6DC;
		--rule-soft: #F0EEE6;
		--rule-strong: #D1CFC5;
		--accent: #C96442;
		--accent-clay: #D97757;
		--accent-deep: #A75A40;
		--accent-hero: #C46849;
		--accent-soft: #EBC9B7;
		--accent-pale: #F0D5C7;
		--dark: #1F1E1D;
		--dark-2: #30302E;
		--silver: #B0AEA5;
		--code-bg: #1F1E1D;
		--code-fg: #FAF9F5;
		--code-dim: #B0AEA5;
	}

	* { box-sizing: border-box; }
	html { background: var(--bg); }

	body {
		margin: 0;
		padding: 0;
		background: var(--bg);
		color: var(--text);
		font-family: 'Hahmlet', Georgia, serif;
		font-size: 19px;
		line-height: 1.75;
		font-weight: 400;
		letter-spacing: -0.003em;
		-webkit-font-smoothing: antialiased;
		-moz-osx-font-smoothing: grayscale;
	}

	/* Code, preformatted text, keyboard input, sample output — all monospace */
	code, pre, kbd, samp {
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
	}

	::selection { background: var(--accent-soft); color: var(--text); }

	.container {
		max-width: 1140px;
		margin: 0 auto;
		padding: 88px 28px 140px;
	}

	/* ── Typographic primitives ── */

	.eyebrow {
		font-size: 12px;
		font-weight: 500;
		letter-spacing: 0.16em;
		text-transform: uppercase;
		color: var(--accent-deep);
		margin: 0 0 28px;
	}

	h1 {
		font-weight: 500;
		font-size: 60px;
		line-height: 1.05;
		letter-spacing: -0.022em;
		margin: 0 0 28px;
		color: var(--text);
	}

	.lede {
		font-size: 24px;
		line-height: 1.45;
		color: var(--text-dim);
		font-weight: 400;
		font-style: italic;
		margin: 0 0 12px;
	}

	.byline {
		font-size: 13px;
		color: var(--text-faint);
		letter-spacing: 0.04em;
		margin-bottom: 64px;
	}
	.byline strong { color: var(--text-dim); font-weight: 500; }

	h2 {
		font-weight: 500;
		font-size: 30px;
		line-height: 1.2;
		letter-spacing: -0.012em;
		margin: 80px 0 24px;
		color: var(--text);
	}
	h2 .num {
		font-style: italic;
		font-weight: 400;
		color: var(--accent-deep);
		font-size: 0.6em;
		margin-right: 14px;
		vertical-align: 0.35em;
		letter-spacing: 0.02em;
	}

	h3 {
		font-weight: 500;
		font-size: 22px;
		line-height: 1.3;
		margin: 44px 0 14px;
		color: var(--text);
	}

	p { margin: 0 0 22px; }
	p + p { margin-top: -2px; }

	.body-start::first-letter {
		font-weight: 500;
		float: left;
		font-size: 62px;
		line-height: 0.92;
		padding: 6px 10px 0 0;
		color: var(--accent-deep);
	}

	a {
		color: var(--accent-deep);
		text-decoration: underline;
		text-underline-offset: 3px;
		text-decoration-thickness: 1px;
		text-decoration-color: var(--accent-soft);
		transition: text-decoration-color 120ms ease;
	}
	a:hover { text-decoration-color: var(--accent-deep); }

	strong { font-weight: 600; color: var(--text); }
	em { font-style: italic; }

	code {
		font-size: 0.85em;
		color: var(--accent-deep);
		background: transparent;
		padding: 0;
		font-weight: 500;
	}

	pre {
		background: var(--code-bg);
		color: var(--code-fg);
		padding: 34px 28px 24px;
		border-radius: 4px;
		overflow-x: auto;
		font-size: 13.5px;
		line-height: 1.65;
		margin: 32px -8px;
		position: relative;
	}

	pre[data-lang]::before {
		content: attr(data-lang);
		position: absolute;
		top: 10px;
		right: 16px;
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
		font-size: 10px;
		line-height: 1;
		letter-spacing: 0.08em;
		text-transform: uppercase;
		color: var(--code-dim);
		opacity: 0.72;
	}

	pre code {
		background: transparent;
		color: var(--code-fg);
		padding: 0;
		border-radius: 0;
		font-weight: 400;
		display: block;
		min-width: max-content;
	}

	/* PrismJS token theme tuned to Anthropic dark code blocks. */
	.token.comment,
	.token.prolog,
	.token.doctype,
	.token.cdata {
		color: var(--code-dim);
		font-style: italic;
	}
	.token.punctuation { color: #D1CFC5; }
	.token.namespace { opacity: 0.72; }
	.token.property,
	.token.tag,
	.token.constant,
	.token.symbol,
	.token.deleted { color: #EBC9B7; }
	.token.boolean,
	.token.number { color: #F0D5C7; }
	.token.selector,
	.token.attr-name,
	.token.string,
	.token.char,
	.token.builtin,
	.token.inserted { color: #E8B888; }
	.token.operator,
	.token.entity,
	.token.url,
	.language-css .token.string,
	.style .token.string { color: #D1CFC5; }
	.token.atrule,
	.token.attr-value,
	.token.keyword { color: #D88A66; }
	.token.function,
	.token.class-name { color: #E8B888; }
	.token.regex,
	.token.important,
	.token.variable { color: #F0D5C7; }
	.token.important,
	.token.bold { font-weight: 600; }
	.token.italic { font-style: italic; }

	.hr-soft { border: none; border-top: 1px solid var(--rule); margin: 56px 0; }

	.ornament {
		text-align: center;
		color: var(--accent-deep);
		font-style: italic;
		font-size: 16px;
		letter-spacing: 0.5em;
		margin: 72px 0;
		opacity: 0.7;
	}

	/* ── Optional components — use when the meaning calls for it ── */

	/* Metadata block — borderless dl */
	.meta {
		border-top: 1px solid var(--rule-strong);
		border-bottom: 1px solid var(--rule-strong);
		padding: 22px 0;
		margin: 36px 0;
		display: grid;
		grid-template-columns: 110px 1fr;
		row-gap: 14px;
		column-gap: 28px;
		font-size: 15px;
	}
	.meta dt {
		text-transform: uppercase;
		letter-spacing: 0.1em;
		font-size: 11px;
		font-weight: 600;
		color: var(--text-faint);
		padding-top: 4px;
	}
	.meta dd { margin: 0; font-size: 15px; color: var(--text); line-height: 1.5; }
	.meta dd code { font-size: 13.5px; }

	.method-tag {
		display: inline-block;
		background: var(--text);
		color: var(--bg);
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
		font-size: 11px;
		font-weight: 600;
		padding: 3px 8px;
		border-radius: 3px;
		letter-spacing: 0.06em;
		margin-right: 10px;
		vertical-align: 1px;
	}

	/* Figures (used for SVG diagrams or images) */
	figure { margin: 44px -8px; padding: 0; }
	figure svg { display: block; width: 100%; height: auto; max-width: 100%; }
	figcaption {
		font-style: italic;
		font-size: 14.5px;
		line-height: 1.5;
		color: var(--text-dim);
		margin-top: 16px;
		padding: 0 24px;
		text-align: center;
	}
	figcaption .fig-num {
		font-weight: 500;
		color: var(--accent-deep);
		font-style: normal;
		font-size: 11px;
		text-transform: uppercase;
		letter-spacing: 0.1em;
		margin-right: 8px;
	}

	/*
	 * SVG text classes: SVG doesn't inherit body's font, so we must declare here.
	 * Use Hahmlet for prose-like labels, JetBrains Mono for code-like identifiers.
	 */
	.svg-text { font-family: 'Hahmlet', Georgia, serif; fill: var(--text); font-size: 13px; }
	.svg-text-italic { font-family: 'Hahmlet', Georgia, serif; font-style: italic; fill: var(--accent-deep); font-size: 12px; }
	.svg-text-mono { font-family: 'JetBrains Mono', monospace; fill: var(--text); font-size: 11.5px; }
	.svg-text-dim { font-family: 'Hahmlet', Georgia, serif; fill: var(--text-faint); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; }

	/* Step list with hanging italic numerals */
	.steps { margin: 40px 0; padding: 0; list-style: none; counter-reset: step; }
	.steps > li {
		counter-increment: step;
		position: relative;
		padding: 10px 0 10px 60px;
		min-height: 30px;
	}
	.steps > li::before {
		content: counter(step, decimal-leading-zero);
		position: absolute;
		left: 0;
		top: 12px;
		font-style: italic;
		font-size: 15px;
		color: var(--accent-deep);
	}
	.steps > li::after {
		content: "";
		position: absolute;
		left: 32px;
		top: 36px;
		bottom: -4px;
		width: 1px;
		background: var(--rule);
	}
	.steps > li:last-child::after { display: none; }
	.steps .step-title { font-size: 16px; color: var(--text); font-weight: 500; line-height: 1.45; }
	.steps .step-desc { font-size: 15px; color: var(--text-dim); margin-top: 4px; line-height: 1.6; }
	.steps .step-desc code { font-size: 13.5px; }

	/* Nested sub-group with accent left rail */
	.nest {
		margin: 14px 0 14px 60px;
		padding: 8px 0 8px 22px;
		border-left: 2px solid var(--accent);
		position: relative;
	}
	.nest[data-label]::before {
		content: attr(data-label);
		position: absolute;
		top: -8px;
		left: 18px;
		background: var(--bg);
		padding: 0 8px;
		font-size: 10px;
		font-weight: 600;
		letter-spacing: 0.16em;
		color: var(--accent-deep);
	}
	.nest ol { list-style: none; padding: 8px 0 4px; margin: 0; counter-reset: substep; }
	.nest ol li {
		counter-increment: substep;
		padding: 8px 0 8px 40px;
		position: relative;
		font-size: 16px;
		line-height: 1.55;
	}
	.nest ol li::before {
		content: counter(substep, upper-alpha);
		position: absolute;
		left: 0;
		top: 9px;
		font-style: italic;
		color: var(--accent-deep);
		font-size: 14px;
	}
	.nest ol li strong { font-weight: 600; }
	.nest ol li .desc { display: block; color: var(--text-dim); font-size: 14.5px; margin-top: 2px; line-height: 1.6; }
	.nest ol li .desc code { font-size: 13px; }

	/* Callout — minimal left-accent */
	.callout {
		margin: 36px 0;
		padding: 4px 0 4px 22px;
		border-left: 2px solid var(--accent);
	}
	.callout-label {
		font-style: italic;
		font-size: 14px;
		color: var(--accent-deep);
		font-weight: 500;
		margin-bottom: 6px;
	}
	.callout ul { margin: 0; padding: 0; list-style: none; }
	.callout li {
		font-size: 16.5px;
		line-height: 1.65;
		color: var(--text);
		padding: 4px 0 4px 16px;
		position: relative;
	}
	.callout li::before {
		content: "•";
		position: absolute;
		left: 0;
		top: 0.55em;
		color: var(--accent);
		font-size: 0.72em;
		line-height: 1;
	}

	/* Aside — softer, for cautions or side notes */
	.aside {
		margin: 36px 0;
		padding: 4px 0 4px 22px;
		border-left: 2px solid var(--rule-strong);
		font-size: 16.5px;
		color: var(--text-dim);
		line-height: 1.65;
	}
	.aside-label {
		font-style: italic;
		font-size: 14px;
		color: var(--text);
		font-weight: 500;
		margin-bottom: 6px;
	}

	/* Pull quote */
	blockquote {
		margin: 44px -10px;
		padding: 6px 0 6px 32px;
		font-size: 24px;
		line-height: 1.4;
		color: var(--text);
		font-style: italic;
		font-weight: 400;
		position: relative;
	}
	blockquote::before {
		content: "\201C";
		position: absolute;
		left: -6px;
		top: 8px;
		font-size: 56px;
		color: var(--accent);
		line-height: 0.5;
		font-style: normal;
	}

	/* Hairline table */
	.t-wrap { overflow-x: auto; margin: 32px 0; }
	table { width: 100%; border-collapse: collapse; font-size: 15.5px; background: transparent; }
	th, td {
		text-align: left;
		padding: 14px 14px 14px 0;
		border-bottom: 1px solid var(--rule);
		vertical-align: top;
		line-height: 1.55;
	}
	thead th {
		border-top: 1px solid var(--rule-strong);
		border-bottom: 1px solid var(--rule-strong);
		font-weight: 600;
		font-size: 11px;
		text-transform: uppercase;
		letter-spacing: 0.08em;
		color: var(--text-faint);
		padding-top: 10px;
		padding-bottom: 10px;
	}
	td:last-child, th:last-child { padding-right: 0; }
	td code { font-size: 13.5px; }

	/* Lessons / takeaway block — inline tagged title + dim body */
	.lesson { margin: 30px 0; padding: 0; }
	.lesson-tag {
		display: inline-block;
		font-style: italic;
		font-size: 13px;
		color: var(--accent-deep);
		margin-right: 8px;
	}
	.lesson-title {
		display: inline;
		font-weight: 500;
		font-size: 19px;
		color: var(--text);
	}
	.lesson-body {
		font-size: 17px;
		color: var(--text-dim);
		line-height: 1.7;
		margin-top: 8px;
	}

	/* Footnotes block */
	.footnotes {
		margin-top: 96px;
		padding-top: 32px;
		border-top: 1px solid var(--rule-strong);
		font-size: 14px;
		color: var(--text-dim);
		line-height: 1.65;
	}
	.footnotes ol { padding-left: 22px; margin: 0; }
	.footnotes li { margin-bottom: 10px; padding-left: 6px; }
	.footnotes code { font-size: 12.5px; color: var(--text-dim); }
	sup a {
		text-decoration: none;
		color: var(--accent-deep);
		font-size: 0.75em;
		font-weight: 500;
		padding: 0 1px;
	}

	/*
	 * Path tree — two-column grid (handles CJK alignment robustly).
	 * .path uses monospace despite not being a <code> element, because the ASCII
	 * tree connectors (└── ├──) need fixed-width to align.
	 */
	.tree {
		background: var(--surface);
		border: 1px solid var(--rule);
		border-radius: 4px;
		padding: 22px 28px;
		margin: 32px 0;
		display: grid;
		grid-template-columns: max-content 1fr;
		column-gap: 32px;
		row-gap: 4px;
		overflow-x: auto;
	}
	.tree .path {
		font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
		font-size: 13px;
		line-height: 1.85;
		color: var(--text);
		white-space: pre;
	}
	.tree .path .dir { color: var(--accent-deep); font-weight: 500; }
	.tree .path .var { color: var(--accent-deep); font-style: italic; }
	.tree .path .branch { color: var(--text-faint); }
	.tree .note {
		font-style: italic;
		font-size: 13.5px;
		color: var(--text-faint);
		align-self: center;
		white-space: nowrap;
	}
	.tree .note:not(:empty)::before {
		content: "— ";
		color: var(--rule-strong);
		font-style: normal;
		margin-right: 2px;
	}

	/* Replay button for animations */
	.replay {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		background: transparent;
		border: 1px solid var(--rule-strong);
		color: var(--text-dim);
		padding: 6px 14px;
		font-size: 12px;
		letter-spacing: 0.04em;
		border-radius: 999px;
		cursor: pointer;
		margin-top: 12px;
		transition: all 150ms ease;
	}
	.replay:hover { border-color: var(--accent); color: var(--accent-deep); }
	.replay svg { width: 12px; height: 12px; }

	/* SVG animation primitives (JS at bottom controls dasharray) */
	.parallel-line { opacity: 0; }
	.parallel-line.ready { opacity: 1; }

	@keyframes pulseDot {
		0%, 100% { opacity: 0.3; r: 3; }
		50%      { opacity: 1; r: 4.5; }
	}
	.pulse { animation: pulseDot 1.6s ease-in-out infinite; }

	@media (prefers-reduced-motion: reduce) {
		.parallel-line {
			stroke-dashoffset: 0 !important;
			transition: none !important;
			opacity: 1 !important;
		}
		.pulse { animation: none; opacity: 1; }
	}

	@media (max-width: 640px) {
		.container { padding: 56px 22px 96px; }
		h1 { font-size: 42px; }
		.lede { font-size: 20px; }
		h2 { font-size: 26px; }
		body { font-size: 17.5px; }
		.meta { grid-template-columns: 1fr; }
		.meta dt { padding-top: 0; }
		.steps > li { padding-left: 44px; }
		.steps > li::after { left: 22px; }
		.nest { margin-left: 44px; }
		blockquote { font-size: 20px; }
		figure { margin: 36px -22px; }
		figcaption { padding: 0 22px; }
	}
</style>
</head>

<div class="container">

	<!-- The body is intentionally empty.
	     Design your own structure based on what the artifact needs.
	     Pull components from ../references/components.md as a catalog.
	     Open this file's CSS above to know what classes are available. -->

</div>

	window.Prism.manual = true;

<!-- Pretty integration: normalize language classes, add labels, and let PrismJS do the actual highlighting. -->
<script>
	(function () {
		try {
			const aliases = {
				js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'javascript',
				ts: 'typescript', tsx: 'typescript',
				kt: 'kotlin', kts: 'kotlin',
				yml: 'yaml', sh: 'bash', shell: 'bash', zsh: 'bash', mysql: 'sql', mariadb: 'sql',
				py: 'python', rb: 'ruby', rs: 'rust', md: 'markdown', html: 'markup', xml: 'markup', svg: 'markup'
			};

			function normalize(lang) {
				if (!lang) return '';
				const clean = lang.toLowerCase().replace(/^language-/, '').replace(/^lang-/, '');
				return aliases[clean] || clean;
			}

			function languageFromClass(code) {
				for (const cls of code.classList) {
					const lang = normalize(cls);
					if (lang && cls !== 'language-none' && cls !== 'language-plaintext') return lang;
				}
				return '';
			}

			function inferLanguage(code, text) {
				const classLang = languageFromClass(code);
				if (classLang) return classLang;
				const dataLang = normalize(code.dataset.lang || code.parentElement?.dataset.lang || '');
				if (dataLang) return dataLang;
				const firstLine = text.split(/\r?\n/, 1)[0] || '';
				const header = firstLine.toLowerCase();
				if (/\.(kt|kts)\b/.test(header)) return 'kotlin';
				if (/\.(mjs|cjs|js|jsx)\b/.test(header)) return 'javascript';
				if (/\.(ts|tsx)\b/.test(header)) return 'typescript';
				if (/\.(sql)\b/.test(header)) return 'sql';
				if (/\.(ya?ml)\b/.test(header)) return 'yaml';
				if (/\.(json)\b/.test(header)) return 'json';
				if (/\.(sh|bash|zsh)\b/.test(header)) return 'bash';
				if (/\.(py)\b/.test(header)) return 'python';
				const trimmed = text.trim();
				if (/^(with|select|update|insert|delete|create|alter)\b/im.test(trimmed)) return 'sql';
				if (/^\s*[\[{]/.test(trimmed) && /[\]}]\s*$/.test(trimmed)) return 'json';
				if (/\b(fun|val|var|data class|suspend|override)\b/.test(text)) return 'kotlin';
				if (/\b(const|let|function|import|export|await|async)\b/.test(text)) return 'javascript';
				if (/^\s*[\w.-]+\s*:/m.test(text)) return 'yaml';
				return 'plaintext';
			}

			document.querySelectorAll('pre code').forEach((code) => {
				const lang = inferLanguage(code, code.textContent || '');
				const prismLang = window.Prism?.languages?.[lang] ? lang : 'plaintext';
				const langClass = 'language-' + prismLang;
				code.classList.remove(...Array.from(code.classList).filter((cls) => /^lang(uage)?-/.test(cls)));
				code.classList.add(langClass);
				code.parentElement.classList.add(langClass);
				if (prismLang !== 'plaintext') code.parentElement.dataset.lang = prismLang;
				if (window.Prism) window.Prism.highlightElement(code);
			});
		} catch (error) {
			document.documentElement.dataset.prettyHighlightError = error && error.message ? error.message : 'PrismJS highlighting failed';
		}
	})();
</script>

<!-- Animation controller — only runs if you add an SVG figure with id="parallelFig".
     The IIFE auto-plays once when the figure enters the viewport, and exposes
     window.replayParallel() for an optional replay button.
     If you don't add such a figure, this script is a no-op. -->
<script>
	(function () {
		const fig = document.getElementById('parallelFig');
		if (!fig) return;
		const fanouts = Array.from(fig.querySelectorAll('.parallel-line.fanout'));
		const joins = Array.from(fig.querySelectorAll('.parallel-line.join'));
		const awaitNode = fig.querySelector('#awaitNode');
		const commitArrow = fig.querySelector('#commitArrow');
		const commitLabel = fig.querySelector('#commitLabel');
		const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

		function prime(lines) {
			return lines.map((line) => {
				const len = line.getTotalLength();
				line.style.strokeDasharray = len;
				line.style.strokeDashoffset = reducedMotion ? 0 : len;
				line.classList.add('ready');
				return len;
			});
		}
		const fanLens = prime(fanouts);
		const joinLens = prime(joins);

		function animate() {
			if (reducedMotion) return;
			fanouts.forEach((line, i) => { line.style.transition = 'none'; line.style.strokeDashoffset = fanLens[i]; });
			joins.forEach((line, i) => { line.style.transition = 'none'; line.style.strokeDashoffset = joinLens[i]; });
			if (awaitNode) {
				awaitNode.style.transition = 'none';
				awaitNode.setAttribute('stroke', 'var(--rule-strong)');
				awaitNode.setAttribute('stroke-dasharray', '3 3');
			}
			if (commitArrow) { commitArrow.style.transition = 'none'; commitArrow.style.opacity = '0'; }
			if (commitLabel) { commitLabel.style.transition = 'none'; commitLabel.style.opacity = '0'; }
			void fig.getBoundingClientRect();

			fanouts.forEach((line, i) => {
				const delay = 0.05 + i * 0.12;
				line.style.transition = 'stroke-dashoffset 0.7s ease-out ' + delay + 's';
				line.style.strokeDashoffset = '0';
			});
			joins.forEach((line, i) => {
				const delay = 0.85 + i * 0.1;
				line.style.transition = 'stroke-dashoffset 0.55s ease-out ' + delay + 's';
				line.style.strokeDashoffset = '0';
			});

			const allDoneAt = (joins.length ? (0.85 + (joins.length - 1) * 0.1 + 0.55) : 1.5);
			if (awaitNode) {
				setTimeout(() => {
					awaitNode.style.transition = 'stroke 0.35s ease-out';
					awaitNode.setAttribute('stroke', 'var(--accent)');
					awaitNode.setAttribute('stroke-dasharray', '0');
				}, allDoneAt * 1000);
			}
			if (commitArrow || commitLabel) {
				setTimeout(() => {
					if (commitArrow) { commitArrow.style.transition = 'opacity 0.35s ease-out'; commitArrow.style.opacity = '1'; }
					if (commitLabel) { commitLabel.style.transition = 'opacity 0.35s ease-out'; commitLabel.style.opacity = '1'; }
				}, (allDoneAt + 0.25) * 1000);
			}
		}

		const observer = new IntersectionObserver((entries) => {
			entries.forEach((entry) => {
				if (entry.isIntersecting) { animate(); observer.unobserve(entry.target); }
			});
		}, { threshold: 0.35 });
		observer.observe(fig);

		window.replayParallel = animate;
	})();
</script>
